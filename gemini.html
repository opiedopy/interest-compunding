<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jafur’s Compound Interest Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
--primary: #00f2fe;
--secondary: #4facfe;
--accent: #f093fb;
--bg: #0f172a;
--card-bg: rgba(30, 41, 59, 0.7);
}

body {
font-family: 'Poppins', sans-serif;
background: radial-gradient(circle at top left, #1e293b, #0f172a);
color: #f8fafc;
display: flex;
justify-content: center;
align-items: center;
min-height: 100vh;
margin: 0;
padding: 20px;
}

.container {
background: var(--card-bg);
backdrop-filter: blur(12px);
border: 1px solid rgba(255, 255, 255, 0.1);
padding: 2rem;
border-radius: 24px;
box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
width: 100%;
max-width: 500px;
}

h1 {
text-align: center;
font-weight: 800;
background: linear-gradient(to right, var(--primary), var(--accent));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
margin-bottom: 2rem;
font-size: 1.8rem;
}

.input-group {
margin-bottom: 1.5rem;
}

label {
display: block;
margin-bottom: 0.5rem;
font-weight: 600;
color: #94a3b8;
}

.value-display {
float: right;
color: var(--primary);
font-weight: bold;
}

input[type="range"] {
width: 100%;
height: 6px;
background: #334155;
border-radius: 5px;
outline: none;
-webkit-appearance: none;
cursor: pointer;
}

input[type="range"]::-webkit-slider-thumb {
-webkit-appearance: none;
width: 18px;
height: 18px;
background: var(--primary);
border-radius: 50%;
box-shadow: 0 0 10px var(--primary);
}

.checkbox-container {
display: flex;
justify-content: space-between;
background: rgba(15, 23, 42, 0.5);
padding: 1rem;
border-radius: 12px;
border: 1px solid #334155;
}

.check-item {
display: flex;
align-items: center;
gap: 8px;
font-size: 0.9rem;
cursor: pointer;
}

.result-container {
margin-top: 2rem;
padding: 1.5rem;
background: linear-gradient(135deg, rgba(0, 242, 254, 0.1), rgba(240, 147, 251, 0.1));
border-radius: 16px;
border: 1px solid var(--primary);
text-align: center;
}

.result-label {
font-size: 0.9rem;
text-transform: uppercase;
letter-spacing: 1px;
color: #94a3b8;
}

#totalValue {
display: block;
font-size: 2.2rem;
font-weight: 800;
color: #fff;
text-shadow: 0 0 20px rgba(0, 242, 254, 0.5);
margin-top: 0.5rem;
}
</style>
</head>
<body>

<div class="container">
<h1>Jafur’s Compound Interest Calculator</h1>

<div class="input-group">
<label>Initial Investment <span class="value-display" id="investVal">$1k</span></label>
<input type="range" id="investSlider" min="0" max="9" value="0" step="1">
</div>

<div class="input-group">
<label>Duration <span class="value-display" id="yearVal">1 Year</span></label>
<input type="range" id="yearSlider" min="0" max="7" value="0" step="1">
</div>

<div class="input-group">
<label>Interest Rate <span class="value-display" id="rateVal">5.0%</span></label>
<input type="range" id="rateSlider" min="1" max="10" value="5" step="0.1">
</div>

<label>Compounding Frequency</label>
<div class="checkbox-container">
<label class="check-item"><input type="radio" name="comp" value="365" checked> Daily</label>
<label class="check-item"><input type="radio" name="comp" value="12"> Monthly</label>
<label class="check-item"><input type="radio" name="comp" value="1"> Yearly</label>
</div>

<div class="result-container">
<span class="result-label">Future Value</span>
<span id="totalValue">$1,051.27</span>
</div>
</div>

<script>
// Arrays for non-linear steps
const investSteps = [1, 5, 10, 25, 50, 100, 250, 500, 750, 1000];
const yearSteps = [1, 2, 5, 10, 20, 30, 40, 50];

const investSlider = document.getElementById('investSlider');
const yearSlider = document.getElementById('yearSlider');
const rateSlider = document.getElementById('rateSlider');
const radios = document.querySelectorAll('input[name="comp"]');

const displays = {
invest: document.getElementById('investVal'),
year: document.getElementById('yearVal'),
rate: document.getElementById('rateVal'),
total: document.getElementById('totalValue')
};

function calculate() {
const P = investSteps[investSlider.value] * 1000;
const t = yearSteps[yearSlider.value];
const r = parseFloat(rateSlider.value) / 100;
let n = 1;

radios.forEach(rb => { if(rb.checked) n = parseInt(rb.value); });

// Compound Interest Formula: A = P(1 + r/n)^(nt)
const A = P * Math.pow((1 + r/n), (n * t));

// Update Displays
displays.invest.innerText = `$${investSteps[investSlider.value]}k`;
displays.year.innerText = `${t} Year${t > 1 ? 's' : ''}`;
displays.rate.innerText = `${(r * 100).toFixed(1)}%`;
displays.total.innerText = new Intl.NumberFormat('en-US', {
style: 'currency',
currency: 'USD'
}).format(A);
}

// Event Listeners
[investSlider, yearSlider, rateSlider].forEach(el => el.addEventListener('input', calculate));
radios.forEach(el => el.addEventListener('change', calculate));

// Init
calculate();
</script>

</body>
</html>
